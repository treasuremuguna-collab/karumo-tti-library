<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karumo TTI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3c6e 0%, #2a5a9a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
        }

        .login-container h1 {
            color: #1a3c6e;
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px;
        }

        .login-container .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-container .subtitle a {
            color: #1a3c6e;
            font-weight: 700;
            text-decoration: none;
        }

        .login-container .subtitle a:hover {
            color: #ffcc00;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            background: #f9fafc;
        }

        .form-group input:focus {
            border-color: #1a3c6e;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 60, 110, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            background: #f9fafc;
        }

        .password-wrapper input:focus {
            border-color: #1a3c6e;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 60, 110, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
            padding: 4px;
        }

        .toggle-password:hover {
            color: #1a3c6e;
        }

        .forgot-password {
            text-align: right;
            margin-top: 4px;
        }

        .forgot-password a {
            color: #888;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-password a:hover {
            color: #1a3c6e;
            text-decoration: underline;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 8px;
            background: #fde8e8;
            padding: 10px 14px;
            border-radius: 10px;
            display: none;
            border-left: 4px solid #dc3545;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #28a745;
            font-size: 14px;
            margin-top: 8px;
            background: #e8f8e8;
            padding: 10px 14px;
            border-radius: 10px;
            display: none;
            border-left: 4px solid #28a745;
        }

        .success-message.show {
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a3c6e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 6px;
        }

        .btn-login:hover {
            background: #ffcc00;
            color: #1a3c6e;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 204, 0, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin: 10px 0;
            color: #1a3c6e;
            font-weight: 600;
        }

        .loading-spinner.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #888;
            font-size: 14px;
        }

        .back-link a {
            color: #1a3c6e;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            color: #ffcc00;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px 35px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.3s ease;
        }

        .modal-content h2 {
            color: #1a3c6e;
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
        }

        .modal-content p {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 18px;
        }

        .modal-content .form-group {
            margin-bottom: 16px;
        }

        .modal-content .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            background: #f9fafc;
        }

        .modal-content .form-group input:focus {
            border-color: #1a3c6e;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 60, 110, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-buttons button {
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .modal-buttons .btn-reset {
            background: #1a3c6e;
            color: white;
        }

        .modal-buttons .btn-reset:hover {
            background: #ffcc00;
            color: #1a3c6e;
            transform: scale(1.02);
        }

        .modal-buttons .btn-cancel {
            background: #f0f0f0;
            color: #555;
        }

        .modal-buttons .btn-cancel:hover {
            background: #ddd;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 28px 18px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🔐 Welcome Back</h1>
        <p class="subtitle">
            Don't have an account? <a href="register.html">Register here</a>
        </p>

        <div class="form-group">
            <label for="email">📧 Email Address</label>
            <input type="email" id="email" placeholder="yourname@karumo.ac.ke" required />
        </div>

        <div class="form-group">
            <label for="password">🔑 Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password" required />
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
                    👁️
                </button>
            </div>
            <div class="forgot-password">
                <a href="#" onclick="openForgotPasswordModal(); return false;">🔓 Forgot Password?</a>
            </div>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <div class="loading-spinner" id="loading-spinner">
            ⏳ Logging in...
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">🚀 Login</button>

        <div class="back-link">
            ← <a href="index.html">Back to Home</a>
        </div>
    </div>

    <!-- ===== FORGOT PASSWORD MODAL ===== -->
    <div class="modal-overlay" id="forgotPasswordModal">
        <div class="modal-content">
            <h2>🔓 Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class="form-group">
                <label for="resetEmail">📧 Email Address</label>
                <input type="email" id="resetEmail" placeholder="yourname@karumo.ac.ke" />
            </div>
            <div id="resetMessage" style="font-size:14px; text-align:center; margin-bottom:14px; color:#555;"></div>
            <div class="modal-buttons">
                <button class="btn-reset" onclick="handlePasswordReset()">📧 Send Reset Link</button>
                <button class="btn-cancel" onclick="closeForgotPasswordModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- FIREBASE IMPORTS -->
    <!-- ========================================= -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "firebase/auth";
        import { getDatabase, ref, get } from "firebase/database";

        // 🔽 REPLACE WITH YOUR FIREBASE CONFIG 🔽
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD-sncC5VIIeYH0A8pdlemIjsZMmEQPUaI",
  authDomain: "karumo-library.firebaseapp.com",
  databaseURL: "https://karumo-library-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "karumo-library",
  storageBucket: "karumo-library.firebasestorage.app",
  messagingSenderId: "327025298202",
  appId: "1:327025298202:web:e4e6f599a8168ee1587aa3",
  measurementId: "G-5M12HQETWX"
};
        // 🔼 REPLACE WITH YOUR FIREBASE CONFIG 🔼

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- EXPOSE TO GLOBAL SCOPE ---
        window.auth = auth;
        window.db = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.sendPasswordResetEmail = sendPasswordResetEmail;
        window.ref = ref;
        window.get = get;

        console.log("🔥 Firebase connected successfully!");
    </script>

    <script>
        // =============================================
        // TOGGLE PASSWORD VISIBILITY
        // =============================================
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        // =============================================
        // FORGOT PASSWORD MODAL
        // =============================================
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('show');
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetMessage').textContent = '';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('show');
        }

        // =============================================
        // HANDLE PASSWORD RESET
        // =============================================
        async function handlePasswordReset() {
            const email = document.getElementById('resetEmail').value.trim();
            const messageDiv = document.getElementById('resetMessage');

            if (!email) {
                messageDiv.innerHTML = '⚠️ Please enter your email address.';
                messageDiv.style.color = '#dc3545';
                return;
            }

            messageDiv.innerHTML = '⏳ Sending reset link...';
            messageDiv.style.color = '#1a3c6e';

            try {
                await sendPasswordResetEmail(auth, email);
                messageDiv.innerHTML =
                    `✅ Password reset email sent to <strong>${email}</strong>. Please check your inbox.`;
                messageDiv.style.color = '#28a745';
                setTimeout(() => {
                    closeForgotPasswordModal();
                }, 4000);
            } catch (error) {
                console.error('Password reset error:', error);
                let friendlyMessage = '❌ ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        friendlyMessage += 'No account found with this email address.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMessage += 'Please enter a valid email address.';
                        break;
                    default:
                        friendlyMessage += error.message || 'Please try again later.';
                }
                messageDiv.innerHTML = friendlyMessage;
                messageDiv.style.color = '#dc3545';
            }
        }

        // =============================================
        // HANDLE LOGIN
        // =============================================
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const spinner = document.getElementById('loading-spinner');
            const btn = document.getElementById('loginBtn');

            // Clear previous messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            errorMsg.textContent = '';
            successMsg.textContent = '';

            if (!email || !password) {
                errorMsg.textContent = '⚠️ Please fill in all fields.';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            spinner.classList.add('show');

            try {
                // --- Sign in with Firebase ---
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ User logged in:', user.email);

                // --- Get user data ---
                const userSnapshot = await get(ref(db, 'users/' + user.uid));
                let userData = null;
                if (userSnapshot.exists()) {
                    userData = userSnapshot.val();
                }

                // --- Check if user is an Admin ---
                const systemSnapshot = await get(ref(db, 'system'));
                let systemData = {};
                if (systemSnapshot.exists()) {
                    systemData = systemSnapshot.val();
                }

                // Check if Super Admin or School Admin
                const isSuperAdmin = user.uid === systemData.superAdminUID;
                const isSchoolAdmin = user.uid === systemData.schoolAdminUID;

                if (isSuperAdmin || isSchoolAdmin) {
                    successMsg.textContent = `✅ Welcome Admin! Redirecting to dashboard...`;
                    successMsg.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'school-admin-dashboard.html';
                    }, 1500);
                    btn.disabled = false;
                    spinner.classList.remove('show');
                    return;
                }

                // --- Redirect based on role ---
                if (userData) {
                    const role = userData.role || 'student';
                    let redirectUrl = 'student-dashboard.html';
                    if (role === 'trainer') {
                        redirectUrl = 'trainer-dashboard.html';
                    }
                    successMsg.textContent = `✅ Welcome back, ${userData.displayName || 'User'}! Redirecting...`;
                    successMsg.classList.add('show');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    errorMsg.textContent = '⚠️ User data not found. Please contact support.';
                    errorMsg.classList.add('show');
                }

            } catch (error) {
                console.error('Login error:', error.code, error.message);
                let friendlyMessage = '❌ Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        friendlyMessage += 'No account found with this email. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        friendlyMessage += 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMessage += 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        friendlyMessage += 'Too many failed attempts. Please try again later.';
                        break;
                    default:
                        friendlyMessage += error.message || 'Please try again later.';
                }
                errorMsg.textContent = friendlyMessage;
                errorMsg.classList.add('show');
            }

            btn.disabled = false;
            spinner.classList.remove('show');
        }

        // =============================================
        // ENTER KEY SUPPORT
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = ['email', 'password'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            document.getElementById('loginBtn').click();
                        }
                    });
                }
            });

            const resetEmail = document.getElementById('resetEmail');
            if (resetEmail) {
                resetEmail.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handlePasswordReset();
                    }
                });
            }

            const modal = document.getElementById('forgotPasswordModal');
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeForgotPasswordModal();
                }
            });
        });
    </script>

</body>
</html>
